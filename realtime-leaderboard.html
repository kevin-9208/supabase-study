<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCOREBOARD // Realtime Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #060a06;
    --panel: #0b120c;
    --phosphor: #3dff8b;
    --phosphor-dim: #1a5c37;
    --amber: #ffb000;
    --red: #ff4d4d;
    --line: #123321;
    --text-dim: #5f9c78;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg);
    color:var(--phosphor);
    font-family:'Space Mono', monospace;
  }
  body{
    display:flex; align-items:center; justify-content:center;
    min-height:100vh;
    padding:32px 16px;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(61,255,139,0.08), transparent 60%),
      var(--bg);
  }

  /* CRT scanline overlay */
  body::before{
    content:"";
    position:fixed; inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.18) 3px
    );
    mix-blend-mode:multiply;
    z-index:50;
  }
  body::after{
    content:"";
    position:fixed; inset:0;
    pointer-events:none;
    box-shadow: inset 0 0 140px rgba(0,0,0,0.85);
    z-index:51;
  }

  .crt{
    width:100%;
    max-width:720px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
    box-shadow:
      0 0 0 1px rgba(61,255,139,0.05),
      0 0 60px rgba(61,255,139,0.06),
      0 30px 80px rgba(0,0,0,0.6);
    overflow:hidden;
    position:relative;
  }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px;
    border-bottom:1px solid var(--line);
    font-family:'VT323', monospace;
    font-size:20px;
    letter-spacing:2px;
    color:var(--text-dim);
  }
  .topbar .title{
    color:var(--phosphor);
    text-shadow:0 0 8px rgba(61,255,139,0.6);
  }
  .status{
    display:flex; align-items:center; gap:8px;
    font-size:16px;
  }
  .dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--phosphor-dim);
    box-shadow:0 0 6px var(--phosphor-dim);
    transition:all .3s ease;
  }
  .dot.live{
    background:var(--phosphor);
    box-shadow:0 0 8px var(--phosphor), 0 0 16px var(--phosphor);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:.4; }
  }

  .header-row{
    display:grid;
    grid-template-columns:56px 1fr 100px;
    padding:10px 20px;
    font-family:'VT323', monospace;
    font-size:17px;
    letter-spacing:3px;
    color:var(--text-dim);
    border-bottom:1px solid var(--line);
  }

  #rows{
    min-height:120px;
  }
  .row{
    display:grid;
    grid-template-columns:56px 1fr 100px;
    align-items:center;
    padding:14px 20px;
    border-bottom:1px solid var(--line);
    transition: background .5s ease;
  }
  .row:last-child{ border-bottom:none; }
  .row.flash{
    background:rgba(61,255,139,0.12);
  }
  .rank{
    font-family:'VT323', monospace;
    font-size:26px;
    color:var(--text-dim);
  }
  .rank.gold{ color:var(--amber); text-shadow:0 0 10px rgba(255,176,0,0.6); }
  .name{
    font-size:15px;
    letter-spacing:1px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    padding-right:8px;
  }
  .score{
    font-family:'VT323', monospace;
    font-size:26px;
    text-align:right;
    color:var(--phosphor);
  }
  .empty{
    padding:40px 20px;
    text-align:center;
    color:var(--text-dim);
    font-family:'VT323', monospace;
    font-size:18px;
  }

  .controls{
    padding:18px 20px 20px;
    border-top:1px solid var(--line);
    display:flex; flex-wrap:wrap; gap:10px;
  }
  input[type=text]{
    flex:1; min-width:140px;
    background:#04140a;
    border:1px solid var(--line);
    color:var(--phosphor);
    font-family:'Space Mono', monospace;
    font-size:13px;
    padding:10px 12px;
    border-radius:3px;
    outline:none;
  }
  input[type=text]:focus{
    border-color:var(--phosphor-dim);
    box-shadow:0 0 0 2px rgba(61,255,139,0.15);
  }
  button{
    font-family:'VT323', monospace;
    font-size:18px;
    letter-spacing:1px;
    background:transparent;
    border:1px solid var(--phosphor-dim);
    color:var(--phosphor);
    padding:10px 16px;
    border-radius:3px;
    cursor:pointer;
    transition:all .15s ease;
  }
  button:hover{
    background:rgba(61,255,139,0.1);
    border-color:var(--phosphor);
  }
  button:active{ transform:translateY(1px); }
  button.primary{
    background:rgba(61,255,139,0.08);
  }
  button:disabled{
    opacity:.35; cursor:not-allowed;
  }

  .footer-note{
    padding:12px 20px 18px;
    font-size:11px;
    line-height:1.6;
    color:var(--text-dim);
    border-top:1px dashed var(--line);
  }
  .footer-note code{
    color:var(--phosphor);
    background:rgba(61,255,139,0.06);
    padding:1px 4px;
    border-radius:2px;
  }

  @media (prefers-reduced-motion: reduce){
    .dot.live{ animation:none; }
    .row{ transition:none; }
  }
</style>
</head>
<body>

<div class="crt">
  <div class="topbar">
    <span class="title">◆ SCOREBOARD</span>
    <span class="status"><span class="dot" id="statusDot"></span><span id="statusText">connecting…</span></span>
  </div>

  <div class="header-row">
    <span>RANK</span><span>PLAYER</span><span style="text-align:right;">SCORE</span>
  </div>

  <div id="rows">
    <div class="empty">等待连接 Supabase…</div>
  </div>

  <div class="controls">
    <input type="text" id="nameInput" placeholder="你的名字 / player name" maxlength="20">
    <button class="primary" id="joinBtn">加入 / JOIN</button>
    <button id="plus10" disabled>+10</button>
    <button id="plus50" disabled>+50</button>
    <button id="plus100" disabled>+100</button>
  </div>

  <div class="footer-note">
    实时数据来自 Supabase Postgres Changes。打开多个浏览器标签页，任意一个加分，所有页面会即时刷新排名。<br>
    请先在下方 <code>SUPABASE_URL</code> / <code>SUPABASE_ANON_KEY</code> 填入你自己项目的凭证，并按对话中给出的 SQL 建表。
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // ====== 在这里填入你自己的 Supabase 项目信息 ======
  const SUPABASE_URL = 'https://qhozxscbpadsoqynmgrf.supabase.co'
  const SUPABASE_ANON_KEY = 'sb_publishable_YurPbCpZc8oH7adm780UiQ_-DS4EEfG'
  // ================================================

  const LIMIT = 10;
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const rowsEl = document.getElementById('rows');
  const nameInput = document.getElementById('nameInput');
  const joinBtn = document.getElementById('joinBtn');
  const plus10 = document.getElementById('plus10');
  const plus50 = document.getElementById('plus50');
  const plus100 = document.getElementById('plus100');

  let sb = null;
  let myPlayerId = null;
  let list = [];
  let configOk = SUPABASE_URL.startsWith('https://') && !SUPABASE_URL.includes('YOUR_PROJECT_REF');

  function setStatus(state, text){
    statusDot.className = 'dot' + (state === 'live' ? ' live' : '');
    statusText.textContent = text;
  }

  function render(){
    if(list.length === 0){
      rowsEl.innerHTML = '<div class="empty">暂无数据，加入并加分试试看</div>';
      return;
    }
    rowsEl.innerHTML = list.map((item, i) => `
      <div class="row" data-id="${item.id}">
        <span class="rank ${i === 0 ? 'gold' : ''}">${String(i+1).padStart(2,'0')}</span>
        <span class="name">${escapeHtml(item.username)}${item.id === myPlayerId ? ' ◂ 你' : ''}</span>
        <span class="score">${item.score}</span>
      </div>
    `).join('');
  }

  function flashRow(id){
    const el = rowsEl.querySelector(`.row[data-id="${id}"]`);
    if(!el) return;
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 500);
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, s => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    }[s]));
  }

  function upsertLocal(row){
    const idx = list.findIndex(i => i.id === row.id);
    if(idx >= 0) list[idx] = row;
    else list.push(row);
    list.sort((a,b) => b.score - a.score);
    list = list.slice(0, LIMIT);
    render();
    flashRow(row.id);
  }

  async function fetchInitial(){
    const { data, error } = await sb
      .from('leaderboard')
      .select('*')
      .order('score', { ascending: false })
      .limit(LIMIT);
    if(error){
      setStatus('', '读取失败: ' + error.message);
      return;
    }
    list = data || [];
    render();
  }

  async function subscribeRealtime(){
    const channel = sb
      .channel('leaderboard-demo')
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'leaderboard' },
        (payload) => {
          if(payload.eventType === 'DELETE'){
            list = list.filter(i => i.id !== payload.old.id);
            render();
          } else {
            upsertLocal(payload.new);
          }
        }
      )
      .subscribe((status) => {
        if(status === 'SUBSCRIBED'){
          setStatus('live', 'live');
        } else if(status === 'CHANNEL_ERROR' || status === 'TIMED_OUT'){
          setStatus('', 'connection error');
        }
      });
  }

  async function joinPlayer(){
    const name = nameInput.value.trim();
    if(!name){ nameInput.focus(); return; }
    joinBtn.disabled = true;

    // 先查是否已有同名玩家，有则复用，没有才新建
    const { data: existing, error: findErr } = await sb
      .from('leaderboard')
      .select('*')
      .eq('username', name)
      .maybeSingle();

    if(findErr){
      setStatus('', 'lookup failed: ' + findErr.message);
      joinBtn.disabled = false;
      return;
    }

    let data = existing;
    if(!data){
      const { data: inserted, error: insertErr } = await sb
        .from('leaderboard')
        .insert({ username: name, score: 0 })
        .select()
        .single();
      if(insertErr){
        setStatus('', 'insert failed: ' + insertErr.message);
        joinBtn.disabled = false;
        return;
      }
      data = inserted;
    }

    myPlayerId = data.id;
    nameInput.disabled = true;
    joinBtn.textContent = '已加入 ✓';
    [plus10, plus50, plus100].forEach(b => b.disabled = false);
  }

  async function addScore(amount){
    if(!myPlayerId) return;
    const current = list.find(i => i.id === myPlayerId);
    const newScore = (current ? current.score : 0) + amount;

    const { error } = await sb
      .from('leaderboard')
      .update({ score: newScore, updated_at: new Date().toISOString() })
      .eq('id', myPlayerId);

    if(error){
      setStatus('', 'update failed: ' + error.message);
    }
  }

  joinBtn.addEventListener('click', joinPlayer);
  plus10.addEventListener('click', () => addScore(10));
  plus50.addEventListener('click', () => addScore(50));
  plus100.addEventListener('click', () => addScore(100));
  nameInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') joinPlayer();
  });

  (async function init(){
    if(!configOk){
      setStatus('', 'not configured');
      rowsEl.innerHTML = '<div class="empty">请先在代码中填入 SUPABASE_URL 和 SUPABASE_ANON_KEY</div>';
      return;
    }
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    setStatus('', 'connecting…');
    await fetchInitial();
    await subscribeRealtime();
  })();
</script>

</body>
</html>
